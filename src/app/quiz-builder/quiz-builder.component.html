<div class="quiz-container">
  <h1>Create a New Quiz</h1>

  <!-- Catégorie -->
  <div class="section">
    <label for="category">Select Category</label>
    <select id="category" [(ngModel)]="selectedCategory">
      <option disabled selected>Select a category</option>
      <option value="soft">Soft Skills</option>
      <option value="hard">Hard Skills</option>
      <option value="team">Team Spirit</option>
      <option value="logic">Logic</option>
      <option value="creativity">Creativity</option>
    </select>
  </div>

  <!-- Questions par catégorie -->
  <div class="section questions" *ngIf="selectedCategory">
    <h2>Questions for {{ selectedCategory | titlecase }}</h2>

    <div class="question-block" *ngFor="let q of [1,2,3,4,5]">
      <label>Question {{ q }}</label>
      <textarea placeholder="Write your question here..."></textarea>

      <div class="question-options">
        <button class="ghost-btn">🤖 Ask Chat</button>
        <button class="ghost-btn">📚 Choose Existing</button>
      </div>
    </div>
  </div>

  <!-- Choix de la classe -->
  <div class="section">
    <label for="classe">Select Class</label>
    <select id="classe">
      <option selected disabled>Choose class</option>
      <option>1A </option>
      <option>2A </option>
      <option>3A </option>
      <option>3B </option>
    </select>
  </div>

  <!-- Générer le quiz -->
  <div class="section">
    <button class="primary-btn" (click)="generateQuiz()">Generate Quiz</button>
  </div>

  <!-- Code généré -->
  <div class="hex-code" *ngIf="quizCode">
    <p>🔐 Quiz Access Code: <strong>{{ quizCode }}</strong></p>
    <!-- Bouton pour commencer le quiz -->
    <button class="primary-btn" (click)="startQuiz()">Start Quiz</button>
  </div>
</div>
