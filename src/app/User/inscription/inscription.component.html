  <header>
    <h1>🌴 Crée ton compte! 🌞</h1>
  </header>


<div class="container">
  <div class="section">
    <h2>Personnalise ton aventure ! 🏝️</h2>
    <form class="create-account">
      <label for="lastname">Nom :</label>
      <input type="text" id="lastname" name="lastname" placeholder="Entre ton nom" required>

      <label for="firstname">Prénom :</label>
      <input type="text" id="firstname" name="firstname" placeholder="Entre ton prénom" required>

      <label for="classe">Classe :</label>
      <input type="text" id="classe" name="classe" placeholder="Ex: 2ème A" required>

      <label for="avatarUpload">Téléverse une image :</label>
      <input type="file" id="avatarUpload" name="avatarUpload" accept="image/*">

      <label>Sexe :</label>
      <div style="display: flex; gap: 2rem; align-items: center; margin-bottom: 1rem;">
        <label style="display: flex; align-items: center; gap: 0.5rem;">
          <input type="radio" id="homme" name="sexe" value="Homme" required>
          Homme
        </label>
        <label style="display: flex; align-items: center; gap: 0.5rem;">
          <input type="radio" id="femme" name="sexe" value="Femme" required>
          Femme
        </label>
      </div>

      <label for="email">Adresse email :</label>
      <input type="email" id="email" name="email" placeholder="nom@example.com" required>

      <label>Choisis ton avatar :</label>
      <div class="avatar-selection">
        <img src="https://img.icons8.com/color/96/000000/sun--v1.png" alt="Avatar Soleil" (click)="selectAvatar('sun')">
        <img src="https://img.icons8.com/color/96/000000/palm-tree.png" alt="Avatar Palmier" (click)="selectAvatar('palm')">
        <img src="https://img.icons8.com/color/96/000000/island.png" alt="Avatar Île" (click)="selectAvatar('island')">
        <img src="https://img.icons8.com/color/96/000000/pineapple.png" alt="Avatar Ananas" (click)="selectAvatar('pineapple')">
      </div>

      <button type="submit" (click)="playSound('click')">Créer mon compte</button>
    </form>
  </div>
</div>
