<div class="user-profile">
  <div class="edit-profile-card">
    <div class="edit-profile-header">
      Edit Profile
      <span>Complete your profile</span>
    </div>
    <form class="profile-form">
      <div class="form-row">
        <div class="form-group">
          <label>Company (disabled)</label>
          <input type="text" disabled value="Esprit">
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" placeholder="Username">
        </div>
        <div class="form-group">
          <label>Email address</label>
          <input type="email" placeholder="Email">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" placeholder="Maram">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" placeholder="Boussalem">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full-width">
          <label>Address</label>
          <input type="text" placeholder="Rue de l'informatique, Tunis">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City</label>
          <input type="text" placeholder="Tunis">
        </div>
        <div class="form-group">
          <label>Country</label>
          <input type="text" placeholder="Tunisie">
        </div>
        <div class="form-group">
          <label>Postal Code</label>
          <input type="text" placeholder="1002">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full-width">
          <label>About Me</label>
          <textarea placeholder="Lamborghini Mercy, Your chick she so thirsty, I'm in that two seat Lambo."></textarea>
        </div>
      </div>
      <button type="submit" class="update-btn">UPDATE PROFILE</button>
    </form>
  </div>

  <div class="profile-card">
    <img src="https://via.placeholder.com/100" alt="Profile">
    <h4>CEO / CO-FOUNDER</h4>
    <h3>Alec Thompson</h3>
    <p>Don't be scared of the truth because we need to restart the human foundation in truth And I love you like Kanye loves Kanye...</p>
    <button class="follow-btn">FOLLOW</button>
  </div>
</div>
